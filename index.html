<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess My Number</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-card">
      <header>
        <h1>🎯 Guess My Number</h1>

        <div class="difficulty-wrapper">
          <label>Difficulty</label>

          <select id="difficulty">
            <option value="20">Easy (1-20)</option>
            <option value="50">Medium (1-50)</option>
            <option value="100">Hard (1-100)</option>
          </select>
        </div>
      </header>

      <div class="number-container">
        <div class="number">?</div>
      </div>

      <p class="message">Start guessing...</p>

      <div class="input-group">
        <input type="number" class="guess" placeholder="Enter number" />

        <button class="btn check">Guess</button>
      </div>

      <div class="stats">
        <div class="stat">
          ⭐ Score:
          <span class="score">20</span>
        </div>

        <div class="stat">
          🏆 Highscore:
          <span class="highscore">0</span>
        </div>

        <div class="stat">
          🎮 Games:
          <span class="games">0</span>
        </div>

        <div class="stat">
          🔥 Streak:
          <span class="streak">0</span>
        </div>
      </div>

      <button class="btn again">Play Again</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
